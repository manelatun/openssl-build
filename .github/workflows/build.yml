name: "Build OpenSSL - Windows (x64)"

on:
  workflow_dispatch:
  
jobs:
  build:
    runs-on: windows-latest
    steps:
    
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64

      - name: Setup NASM
        shell: pwsh
        run: |
          aria2c https://www.nasm.us/pub/nasm/releasebuilds/3.01/win64/nasm-3.01-win64.zip
          7z x nasm-3.01-win64.zip -o"nasm"
          rm nasm-3.01-win64.zip
          "nasm/nasm-3.01" | Resolve-Path >> $env:GITHUB_PATH

      - name: Setup StrawberryPerl
        shell: pwsh
        run: |
          aria2c https://github.com/StrawberryPerl/Perl-Dist-Strawberry/releases/download/SP_54221_64bit/strawberry-perl-5.42.2.1-64bit-portable.zip
          7z x strawberry-perl-5.42.2.1-64bit-portable.zip -o"perl"
          "perl/site/bin" | Resolve-Path >> $env:GITHUB_PATH
          "perl/bin" | Resolve-Path >> $env:GITHUB_PATH
          "perl/c/bin" | Resolve-Path >> $env:GITHUB_PATH
          rm strawberry-perl-5.42.2.1-64bit-portable.zip

          Write-Output $env:PATH

      - uses: actions/checkout@v6
        with:
          repository: openssl/openssl
          submodules: true
          ref: openssl-3.6.2
